<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BTC Parser</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 16px;
  width: 350px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>📊 BTC Export</h2>

  <input type="date" id="from">
  <input type="date" id="to">

  <button onclick="loadData()">Скачать CSV</button>
</div>

<script>
async function loadData() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  let page = 1;
  let all = [];

  while (true) {
    const res = await fetch(`/api/proxy?from=${from}&to=${to}&page=${page}`);
    const html = await res.text();

    const doc = new DOMParser().parseFromString(html, "text/html");
    const rows = doc.querySelectorAll("tbody tr");

    if (!rows.length) break;

    let valid = 0;

    rows.forEach(r => {
      const c = r.querySelectorAll("td");
      if (c.length < 6) return;

      valid++;

      all.push([
        c[0].innerText.trim(),
        c[1].innerText.trim(),
        c[2].innerText.trim(),
        c[3].innerText.trim(),
        c[4].innerText.trim(),
        c[5].innerText.trim()
      ]);
    });

    if (valid === 0) break;
    page++;
  }

  let csv = "crypto,date,usd_kzt,price_kzt,market_cap,volume\n";
  all.forEach(r => csv += r.join(",") + "\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "btc.csv";
  a.click();
}
</script>

</body>
</html>
