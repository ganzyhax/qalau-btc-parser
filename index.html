<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BTC Export</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #1e293b;
  padding: 30px;
  border-radius: 16px;
  width: 360px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-size: 14px;
  opacity: 0.8;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
}

button:hover {
  background: #16a34a;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="card">
  <h2>📊 BTC Export</h2>

  <label>Дата с:</label>
  <input type="date" id="from">

  <label>Дата по:</label>
  <input type="date" id="to">

  <button onclick="download()">⬇️ Скачать XLSX</button>

  <div class="status" id="status"></div>
</div>

<script>
function format(date) {
  return new Date(date).toLocaleDateString("ru-RU");
}

async function download() {
  const fromInput = document.getElementById("from").value;
  const toInput = document.getElementById("to").value;

  if (!fromInput || !toInput) {
    alert("Выбери даты");
    return;
  }

  const status = document.getElementById("status");
  status.innerText = "⏳ Загружаю данные...";

  try {
    const url = `/api/download?from=${format(fromInput)}&to=${format(toInput)}`;

    const res = await fetch(url);

    if (!res.ok) {
      throw new Error("Ошибка сервера");
    }

    const blob = await res.blob();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "btc.xlsx";
    a.click();

    status.innerText = "✅ Готово!";
  } catch (e) {
    console.log(e);
    status.innerText = "❌ Ошибка загрузки";
  }
}
</script>

</body>
</html>
